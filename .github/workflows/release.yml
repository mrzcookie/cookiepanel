name: Release daemon

# Cut a daemon release by pushing a `v*` tag (e.g. `v1.2.3`). The job builds the
# linux amd64/arm64 binaries with the tag stamped in via ldflags, writes a
# `.sha256` sidecar beside each, and uploads all four assets to a GitHub Release
# for the tag.
#
# The panel then reaches them at
#   ${DAEMON_RELEASE_BASE_URL}/v<version>/cookied-linux-<arch>(.sha256)
# where DAEMON_RELEASE_BASE_URL is this repo's
#   https://github.com/<owner>/<repo>/releases/download
# Bump DAEMON_LATEST_VERSION in the panel to point nodes at the new build.
on:
  push:
    tags:
      - "v*"
  # Allow a manual dry-run build (no release is published) for a chosen tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (artifacts only, no release published)"
        required: true

permissions:
  # Needed to create the GitHub Release and upload assets.
  contents: write

jobs:
  release:
    name: Build + publish cookied
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/daemon
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the requested tag on manual runs; the pushed tag otherwise.
          ref: ${{ github.event.inputs.tag || github.ref }}
          # Full history + tags so `git describe --tags` resolves the version.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/daemon/go.mod
          cache-dependency-path: apps/daemon/go.sum

      # Cross-compile both arches + write the .sha256 sidecars. VERSION is taken
      # from the tag via `git describe --tags` (the Makefile default), so the
      # binary's `cookied version` matches the release tag.
      - name: Build release artifacts
        run: make release

      - name: List artifacts
        run: ls -l bin && echo "--- checksums ---" && cat bin/*.sha256

      # Only publish on a real tag push — workflow_dispatch is a dry run.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/daemon/bin/cookied-linux-amd64
            apps/daemon/bin/cookied-linux-amd64.sha256
            apps/daemon/bin/cookied-linux-arm64
            apps/daemon/bin/cookied-linux-arm64.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
