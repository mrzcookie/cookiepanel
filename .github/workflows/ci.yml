name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract — bindings in sync + the WS envelope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/wings/go.mod
          cache-dependency-path: apps/wings/go.sum
      - run: bun install --frozen-lockfile
      # Regenerate from openapi.yaml; the committed bindings must match. (The
      # conformance assertions themselves run in the panel typecheck + daemon
      # `go test` jobs.)
      - run: bun run --filter @raptor/contract generate
      - name: committed bindings match the spec
        run: |
          if ! git diff --exit-code -- packages/contract/gen apps/wings/internal/contract/contract.gen.go; then
            echo "::error::Generated contract bindings are stale. Run: bun run --filter @raptor/contract generate"
            exit 1
          fi
      # The WS RPC envelope: type-check the op-registry helpers and round-trip
      # the frames (which pins the same canonical JSON as the daemon's Go test).
      - run: bun run --filter @raptor/contract typecheck
      - run: bun run --filter @raptor/contract test

  panel:
    name: Panel — lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The build evaluates server/env.ts (t3-env, eager validation). CI has no
      # DB/auth secrets and doesn't need them to type-check or bundle — the env
      # module's documented escape hatch skips validation for build/CI.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - run: bun install --frozen-lockfile
      - run: bun run check:ci
      - run: bun run --filter @raptor/panel typecheck
      - run: bun run --filter @raptor/panel build

  daemon:
    name: Daemon — fmt, vet, test, build
    # Linux runner so the real-Docker tests (borg backups, the egg install
    # pipeline, the SFTP round-trip, volumes) and any Linux-only paths run for
    # real — they can't on the macOS dev box. Docker is preinstalled here.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/wings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/wings/go.mod
          cache-dependency-path: apps/wings/go.sum
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofmt-clean:"
            echo "$files"
            exit 1
          fi
      - run: go vet ./...
      # Full suite incl. the real-Docker integration tests (borg backups, the egg
      # install pipeline, SFTP, volumes). Plain (no -race): under the race detector
      # the runner's container scheduling shifts enough to flake these integration
      # tests — and -race found no actual race here, so it buys nothing on them.
      #
      # gotestsum --rerun-fails re-runs ONLY a failed test (up to 2x): the borg
      # backup round-trip is occasionally flaky on the shared runner's overlay2
      # (an exit-0 restore that lost a file — passes deterministically on real
      # hardware), so a transient hiccup retries instead of failing the build,
      # while a genuinely broken test still fails every rerun.
      - run: go run gotest.tools/gotestsum@latest --rerun-fails=2 --packages=./... -- -count=1
      # -race where it's meaningful AND reliable: the Docker-free, concurrency-
      # bearing packages (the IPC server, the cron scheduler, …). The daemon runs
      # as root and is heavily concurrent, so these are worth guarding for races.
      - run: go test -race -count=1 ./internal/drive/ ./internal/ipc/ ./internal/link/ ./internal/scheduler/ ./internal/tui/
      - run: make build
      - run: make cross
