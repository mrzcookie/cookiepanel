name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    name: Panel — lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The build evaluates server/env.ts (t3-env, eager validation). CI has no
      # DB/auth secrets and doesn't need them to type-check or bundle — the env
      # module's documented escape hatch skips validation for build/CI.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:ci
      - run: pnpm --filter @cookiepanel/panel typecheck
      - run: pnpm --filter @cookiepanel/panel build

  daemon:
    name: Daemon — fmt, vet, test, build
    # Linux runner so the real-Docker tests (borg backups, the egg install
    # pipeline, the SFTP round-trip, volumes) and any Linux-only paths run for
    # real — they can't on the macOS dev box. Docker is preinstalled here.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/daemon/go.mod
          cache-dependency-path: apps/daemon/go.sum
      - name: gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofmt-clean:"
            echo "$files"
            exit 1
          fi
      - run: go vet ./...
      # Full suite incl. the real-Docker integration tests (borg backups, the egg
      # install pipeline, SFTP, volumes). Plain (no -race): under the race detector
      # the runner's container scheduling shifts enough to flake these integration
      # tests — and -race found no actual race here, so it buys nothing on them.
      - run: go test -count=1 ./...
      # -race where it's meaningful AND reliable: the Docker-free, concurrency-
      # bearing packages (the IPC server, the cron scheduler, …). The daemon runs
      # as root and is heavily concurrent, so these are worth guarding for races.
      - run: go test -race -count=1 ./internal/drive/ ./internal/ipc/ ./internal/scheduler/ ./internal/tls/ ./internal/tui/
      - run: make build
      - run: make cross
