openapi: 3.0.3
info:
  title: CookiePanel panel↔daemon API
  version: 1.0.0
  description: >
    The HTTPS API the panel calls on each box's `cookied`. This spec is the single
    source of truth for the wire format: TypeScript types (panel) and Go types
    (daemon) are generated from it, and each side asserts its hand-written types
    conform. Auth is `Authorization: Bearer <node_key>` over TLS on every route.
    The console WebSocket (`GET /api/servers/{id}/ws`, JWT query param) is not
    modelled here — it isn't request/response shaped.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: system
  - name: servers
  - name: networks
  - name: firewall
  - name: drives
  - name: files
  - name: sftp
  - name: schedules
  - name: backups
  - name: redis

paths:
  /system:
    get:
      tags: [system]
      operationId: getSystem
      summary: Daemon + docker + host summary
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/System" } } }
  /system/host:
    get:
      tags: [system]
      operationId: getSystemHost
      summary: Slow-changing host info
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/HostInfo" } } }
  /system/stats:
    get:
      tags: [system]
      operationId: getSystemStats
      summary: Live host utilization
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/Stats" } } }
  /system/reboot:
    post:
      tags: [system]
      operationId: reboot
      summary: Reboot the host
      responses:
        "202": { description: Rebooting, content: { application/json: { schema: { $ref: "#/components/schemas/StatusResponse" } } } }
        "501": { $ref: "#/components/responses/NotImplemented" }
  /system/prune:
    post:
      tags: [system]
      operationId: prune
      summary: Free disk (dangling images + build cache)
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/PruneResult" } } }
  /system/restart-daemon:
    post:
      tags: [system]
      operationId: restartDaemon
      summary: Restart the daemon (systemd)
      responses:
        "202": { description: Restarting, content: { application/json: { schema: { $ref: "#/components/schemas/StatusResponse" } } } }
        "501": { $ref: "#/components/responses/NotImplemented" }
  /system/update-daemon:
    post:
      tags: [system]
      operationId: updateDaemon
      summary: Download + verify + swap the daemon binary, then restart
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateDaemonRequest" } } }
      responses:
        "202": { description: Updating, content: { application/json: { schema: { $ref: "#/components/schemas/StatusResponse" } } } }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /servers:
    get:
      tags: [servers]
      operationId: listServers
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Server" } } } }
    post:
      tags: [servers]
      operationId: createServer
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateServerRequest" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Server" } } }
  /servers/{id}:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    get:
      tags: [servers]
      operationId: getServer
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Server" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [servers]
      operationId: deleteServer
      responses: { "204": { description: Deleted } }
  /servers/{id}/start:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [servers]
      operationId: startServer
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Server" } } } }
  /servers/{id}/stop:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [servers]
      operationId: stopServer
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Server" } } } }
  /servers/{id}/restart:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [servers]
      operationId: restartServer
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Server" } } } }
  /servers/{id}/command:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [servers]
      operationId: sendServerCommand
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ServerCommandRequest" } } }
      responses: { "204": { description: Sent } }

  /networks:
    get:
      tags: [networks]
      operationId: listNetworks
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Network" } } } }
    post:
      tags: [networks]
      operationId: createNetwork
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateNetworkRequest" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Network" } } } }
  /networks/{id}:
    parameters: [{ $ref: "#/components/parameters/NetworkId" }]
    delete:
      tags: [networks]
      operationId: deleteNetwork
      responses: { "204": { description: Deleted } }
  /networks/{id}/attach:
    parameters: [{ $ref: "#/components/parameters/NetworkId" }]
    post:
      tags: [networks]
      operationId: attachNetwork
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AttachRequest" } } }
      responses: { "204": { description: Attached } }
  /networks/{id}/detach:
    parameters: [{ $ref: "#/components/parameters/NetworkId" }]
    post:
      tags: [networks]
      operationId: detachNetwork
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AttachRequest" } } }
      responses: { "204": { description: Detached } }

  /firewall:
    get:
      tags: [firewall]
      operationId: getFirewall
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FirewallStatus" } } } }
  /firewall/open:
    post:
      tags: [firewall]
      operationId: openFirewallPort
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/FirewallRule" } } }
      responses:
        "204": { description: Opened }
        "501": { $ref: "#/components/responses/NotImplemented" }
  /firewall/close:
    post:
      tags: [firewall]
      operationId: closeFirewallPort
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/FirewallRule" } } }
      responses:
        "204": { description: Closed }
        "501": { $ref: "#/components/responses/NotImplemented" }

  /drives:
    get:
      tags: [drives]
      operationId: listDrives
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Drive" } } } }
  /drives/format:
    post:
      tags: [drives]
      operationId: formatDrive
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/FormatDriveRequest" } } }
      responses: { "204": { description: Formatted }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "501": { $ref: "#/components/responses/NotImplemented" } }
  /drives/mount:
    post:
      tags: [drives]
      operationId: mountDrive
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/MountDriveRequest" } } }
      responses: { "204": { description: Mounted }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "501": { $ref: "#/components/responses/NotImplemented" } }
  /drives/unmount:
    post:
      tags: [drives]
      operationId: unmountDrive
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DeviceRequest" } } }
      responses: { "204": { description: Unmounted }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "501": { $ref: "#/components/responses/NotImplemented" } }
  /drives/data-target:
    post:
      tags: [drives]
      operationId: setDataTarget
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DeviceRequest" } } }
      responses: { "204": { description: Set }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "501": { $ref: "#/components/responses/NotImplemented" } }

  /servers/{id}/files/list:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/PathQuery" }]
    get:
      tags: [files]
      operationId: listFiles
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FileEntry" } } } }
  /servers/{id}/files/read:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/PathQuery" }]
    get:
      tags: [files]
      operationId: readFile
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FileContent" } } } }
  /servers/{id}/files/write:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: writeFile
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WriteFileRequest" } } }
      responses: { "204": { description: Written } }
  /servers/{id}/files/mkdir:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: mkdir
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PathRequest" } } }
      responses: { "204": { description: Created } }
  /servers/{id}/files/rename:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: renameFile
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RenameRequest" } } }
      responses: { "204": { description: Renamed } }
  /servers/{id}/files/delete:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: deleteFile
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PathRequest" } } }
      responses: { "204": { description: Trashed } }
  /servers/{id}/files/download:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/PathQuery" }]
    get:
      tags: [files]
      operationId: downloadFile
      responses:
        "200": { description: File bytes, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
  /servers/{id}/files/upload:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/PathQuery" }]
    post:
      tags: [files]
      operationId: uploadFile
      requestBody:
        required: true
        content: { application/octet-stream: { schema: { type: string, format: binary } } }
      responses: { "204": { description: Uploaded } }
  /servers/{id}/files/url-download:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: startUrlDownload
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UrlDownloadRequest" } } }
      responses:
        "202": { description: Accepted, content: { application/json: { schema: { $ref: "#/components/schemas/JobAccepted" } } } }
  /servers/{id}/files/url-download/{jobId}:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/JobId" }]
    get:
      tags: [files]
      operationId: getUrlDownload
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DownloadJob" } } } }
  /servers/{id}/files/archive:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: archiveFiles
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ArchiveRequest" } } }
      responses: { "204": { description: Archived } }
  /servers/{id}/files/extract:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: extractFile
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ExtractRequest" } } }
      responses: { "204": { description: Extracted } }
  /servers/{id}/files/trash:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    get:
      tags: [files]
      operationId: listTrash
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/TrashEntry" } } } }
  /servers/{id}/files/trash/restore:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: restoreTrash
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TrashIdRequest" } } }
      responses: { "204": { description: Restored } }
  /servers/{id}/files/trash/delete:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: deleteTrash
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TrashIdRequest" } } }
      responses: { "204": { description: Deleted } }
  /servers/{id}/files/trash/empty:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: emptyTrash
      responses: { "204": { description: Emptied } }
  /servers/{id}/files/trash/purge:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [files]
      operationId: purgeTrash
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TrashPurgeRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PurgeResult" } } } }

  /servers/{id}/sftp:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    get:
      tags: [sftp]
      operationId: getSftp
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SftpStatusResponse" } } } }
    post:
      tags: [sftp]
      operationId: mintSftp
      responses:
        "201": { description: Minted, content: { application/json: { schema: { $ref: "#/components/schemas/SftpMintResponse" } } } }
    delete:
      tags: [sftp]
      operationId: revokeSftp
      responses: { "204": { description: Revoked } }

  /schedules:
    get:
      tags: [schedules]
      operationId: listSchedules
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Schedule" } } } }
    post:
      tags: [schedules]
      operationId: upsertSchedule
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Schedule" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Schedule" } } } }
  /schedules/{id}:
    parameters: [{ $ref: "#/components/parameters/ScheduleId" }]
    delete:
      tags: [schedules]
      operationId: deleteSchedule
      responses: { "204": { description: Deleted } }
  /schedules/{id}/run:
    parameters: [{ $ref: "#/components/parameters/ScheduleId" }]
    post:
      tags: [schedules]
      operationId: runSchedule
      responses: { "204": { description: Ran } }

  /servers/{id}/backups:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    get:
      tags: [backups]
      operationId: listBackups
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Backup" } } } }
    post:
      tags: [backups]
      operationId: createBackup
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateBackupRequest" } } }
      responses:
        "202": { description: Creating, content: { application/json: { schema: { $ref: "#/components/schemas/Backup" } } } }
  /servers/{id}/backups/restore:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [backups]
      operationId: restoreBackup
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RestoreBackupRequest" } } }
      responses: { "204": { description: Restored } }
  /servers/{id}/backups/{archive}/lock:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/Archive" }]
    post:
      tags: [backups]
      operationId: lockBackup
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LockBackupRequest" } } }
      responses: { "204": { description: Set } }
  /servers/{id}/backups/{archive}:
    parameters: [{ $ref: "#/components/parameters/ServerId" }, { $ref: "#/components/parameters/Archive" }]
    delete:
      tags: [backups]
      operationId: deleteBackup
      responses:
        "204": { description: Deleted }
        "409": { $ref: "#/components/responses/Conflict" }

  # ── Redis "Browser" add-on ──────────────────────────────────────────────────
  # Every request carries the admin password + logical db in the body (over the
  # pinned channel); the daemon resolves the container's published 6379 itself.
  /servers/{id}/redis/overview:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisOverview
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisAuth" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RedisOverview" } } } }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/keys:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisKeys
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisKeysRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RedisKeyList" } } } }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/key:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisKey
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisKeyRequest" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RedisKeyDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/set:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisSet
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisSetBody" } } }
      responses:
        "204": { description: Set }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/delete:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisDelete
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisKeyRequest" } } }
      responses:
        "204": { description: Deleted }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/rename:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisRename
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisRenameRequest" } } }
      responses:
        "204": { description: Renamed }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/ttl:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisTtl
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisTtlRequest" } } }
      responses:
        "204": { description: Set }
        "502": { $ref: "#/components/responses/BadGateway" }
  /servers/{id}/redis/flush:
    parameters: [{ $ref: "#/components/parameters/ServerId" }]
    post:
      tags: [redis]
      operationId: redisFlush
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RedisAuth" } } }
      responses:
        "204": { description: Flushed }
        "502": { $ref: "#/components/responses/BadGateway" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: The per-node key the panel mints at enrollment.

  parameters:
    ServerId: { name: id, in: path, required: true, schema: { type: string } }
    NetworkId: { name: id, in: path, required: true, schema: { type: string } }
    ScheduleId: { name: id, in: path, required: true, schema: { type: string } }
    JobId: { name: jobId, in: path, required: true, schema: { type: string } }
    Archive: { name: archive, in: path, required: true, schema: { type: string } }
    PathQuery: { name: path, in: query, required: true, schema: { type: string } }

  responses:
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Forbidden
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotImplemented:
      description: Not supported on this host
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    BadGateway:
      description: Could not reach / authenticate to the instance
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    StatusResponse:
      type: object
      required: [status]
      properties:
        status: { type: string }
    FileContent:
      type: object
      required: [content]
      properties:
        content: { type: string }
    JobAccepted:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }
