pre-commit:
  parallel: true
  jobs:
    - name: check-ts
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: check-go
      glob: "apps/wings/**/*.go"
      run: cd apps/wings && gofmt -w . && go vet ./...
      stage_fixed: true
