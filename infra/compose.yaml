# Local dev infrastructure for the panel — Postgres + Redis (+ an Upstash REST
# proxy in front of it) + MinIO (S3).
# Bring up with `bun run dev:up` (or `docker compose up -d`); stop with `bun run dev:down`.
# Defaults match apps/panel/.env.example (DATABASE_URL / UPSTASH_REDIS_REST_* / S3_*).
# MinIO console: http://localhost:9001 (login minioadmin / minioadmin).
name: raptor

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raptor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raptor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # serverless-redis-http (SRH) — fronts the local Redis with the Upstash REST
  # API, so @upstash/redis talks to it in dev exactly as it talks to Upstash in
  # prod. The panel points UPSTASH_REDIS_REST_URL at this (never redis:6379
  # directly); SRH_TOKEN is dev-only and matches apps/panel/.env.example.
  serverless-redis-http:
    image: hiett/serverless-redis-http:0.0.10
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_MODE: env
      SRH_TOKEN: raptor_dev_token
      SRH_CONNECTION_STRING: "redis://redis:6379"
    ports:
      - "8079:80"

  # MinIO — S3-compatible object storage for testing uploads (egg icons,
  # avatars, public assets). Console at http://localhost:9001, S3 API at :9000.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Dev-only root credentials; never reuse these in production.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      # The minio image ships curl (no wget/mc on the runtime path); probe the
      # built-in liveness endpoint.
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot provisioner: waits for MinIO to be healthy, then creates the
  # "raptor" bucket and opens it to anonymous downloads so public-asset URLs
  # (e.g. avatars) resolve in the browser. Idempotent — safe to re-run; exits 0.
  # NOTE: anonymous (public) read on the whole bucket is a DEV convenience.
  # In production, scope public read to public prefixes only (e.g. set the
  # download policy on `raptor/public/*`), not the entire bucket.
  minio-setup:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/raptor
        mc anonymous set download local/raptor
        echo "minio-setup: bucket 'raptor' ready (anonymous download)"

volumes:
  postgres-data:
  redis-data:
  minio-data:
