# Local dev infrastructure for the panel — Postgres + Redis + MinIO (S3).
# Bring up with `pnpm dev:up` (or `docker compose up -d`); stop with `pnpm dev:down`.
# Defaults match apps/panel/.env.example (DATABASE_URL / REDIS_URL / S3_*).
# MinIO console: http://localhost:9001 (login minioadmin / minioadmin).
name: raptorpanel

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raptorpanel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raptorpanel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO — S3-compatible object storage for testing uploads (egg icons,
  # avatars, public assets). Console at http://localhost:9001, S3 API at :9000.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Dev-only root credentials; never reuse these in production.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      # The minio image ships curl (no wget/mc on the runtime path); probe the
      # built-in liveness endpoint.
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot provisioner: waits for MinIO to be healthy, then creates the
  # "raptorpanel" bucket and opens it to anonymous downloads so public-asset URLs
  # (e.g. avatars) resolve in the browser. Idempotent — safe to re-run; exits 0.
  # NOTE: anonymous (public) read on the whole bucket is a DEV convenience.
  # In production, scope public read to public prefixes only (e.g. set the
  # download policy on `raptorpanel/public/*`), not the entire bucket.
  minio-setup:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/raptorpanel
        mc anonymous set download local/raptorpanel
        echo "minio-setup: bucket 'raptorpanel' ready (anonymous download)"

volumes:
  postgres-data:
  redis-data:
  minio-data:
